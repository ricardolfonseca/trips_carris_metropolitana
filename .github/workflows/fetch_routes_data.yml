name: Fetch Carris Metropolitana Routes

on:
  schedule:
    - cron: '10 08 * * *'   # Runs daily at 17:05 UTC (staggered from stops)
  workflow_dispatch:        # Allows manual trigger from GitHub UI

jobs:
  fetch-and-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch routes data
        run: curl -s https://api.carrismetropolitana.pt/v2/routes > routes.json

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Upload to Databricks Volume
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks fs cp --overwrite routes.json "dbfs:/Volumes/trips_carris_metropolitana/bronze/routes/routes.json"
